<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Home - nostr.blue</title>
		<meta name="description" content="nostr.blue - Decentralized social network on Nostr with DVMs, communities, Lightning zaps, and more. Built with Svelte 5 and Welshman." />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Home - nostr.blue" />
		<meta property="og:description" content="nostr.blue - Decentralized social network on Nostr with DVMs, communities, Lightning zaps, and more. Built with Svelte 5 and Welshman." />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Apply theme immediately to prevent flash
			(function() {
				try {
					const config = JSON.parse(localStorage.getItem('app-config') || '{}');
					const theme = config.theme || 'dark';
					if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
						document.documentElement.classList.add('dark');
					}
				} catch (e) {
					// Default to dark theme on error
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
